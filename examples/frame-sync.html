<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frame Sync Demo</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #172033;
      background: #f4f6f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid #d1d9e6;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9aa4b2;
    }

    .dot.open {
      background: #159947;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }

    .panel {
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      color: #526070;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 38px;
      border: 1px solid #c6d0dd;
      border-radius: 6px;
      padding: 0 10px;
      color: #101827;
      background: #fff;
      outline: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      color: #fff;
      background: #2563eb;
      cursor: pointer;
    }

    button.secondary {
      color: #172033;
      background: #e5eaf1;
    }

    button.danger {
      background: #d92d20;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfe;
    }

    .metric span {
      display: block;
      color: #526070;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      display: block;
      min-height: 24px;
      overflow-wrap: anywhere;
      font-size: 18px;
    }

    .stage-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px;
      gap: 14px;
      align-items: start;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 1px solid #c6d0dd;
      border-radius: 8px;
      background: #f8fafc;
      display: block;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 8px;
      justify-content: center;
      margin: 4px 0 12px;
    }

    .controls button {
      width: 44px;
      height: 44px;
      padding: 0;
      background: #334155;
    }

    .controls .up {
      grid-column: 2;
      grid-row: 1;
    }

    .controls .left {
      grid-column: 1;
      grid-row: 2;
    }

    .controls .stop {
      grid-column: 2;
      grid-row: 2;
      background: #64748b;
    }

    .controls .right {
      grid-column: 3;
      grid-row: 2;
    }

    .controls .down {
      grid-column: 2;
      grid-row: 3;
    }

    .hint {
      margin: 0;
      color: #526070;
      font-size: 13px;
      line-height: 1.5;
    }

    .event-log {
      min-height: 120px;
      max-height: 180px;
      overflow: auto;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .empty {
      color: #9ca3af;
    }

    @media (max-width: 880px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout,
      .metrics,
      .stage-wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="page">
    <header class="topbar">
      <h1>帧同步模拟</h1>
      <span class="status">
        <span class="dot" :class="{ open: connected }"></span>
        {{ connected ? '已连接' : '未连接' }}
      </span>
    </header>

    <main class="layout">
      <div class="stack">
        <section class="panel">
          <h2>连接</h2>
          <div class="field">
            <label for="url">WebSocket URL</label>
            <input id="url" v-model="url">
          </div>
          <div class="actions">
            <button @click="connect" :disabled="connected">连接</button>
            <button class="danger" @click="disconnect" :disabled="!connected">断开</button>
          </div>
        </section>

        <section class="panel">
          <h2>身份</h2>
          <div class="field">
            <label for="clientId">ID</label>
            <input id="clientId" v-model.trim="clientId" :disabled="confirmed" placeholder="例如 10001">
          </div>
          <div class="actions">
            <button @click="confirmId" :disabled="!connected || !clientId || confirmed">确认</button>
            <button class="secondary" @click="resetId" :disabled="!confirmed">重置</button>
          </div>
        </section>

        <section class="panel">
          <h2>匹配</h2>
          <div class="actions">
            <button @click="joinMatch" :disabled="!canMatch || matching || roomExists">加入匹配</button>
            <button class="secondary" @click="exitMatch" :disabled="!canMatch || !matching || roomExists">退出匹配</button>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="panel">
          <h2>状态</h2>
          <div class="metrics">
            <div class="metric">
              <span>ID</span>
              <strong>{{ clientId || '-' }}</strong>
            </div>
            <div class="metric">
              <span>房间</span>
              <strong>{{ roomId || '-' }}</strong>
            </div>
            <div class="metric">
              <span>成员</span>
              <strong>{{ playersText }}</strong>
            </div>
            <div class="metric">
              <span>最新帧</span>
              <strong>{{ latestFrameIndex || 0 }}</strong>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>画布</h2>
          <div class="stage-wrap">
            <canvas ref="stage" width="800" height="500"></canvas>
            <div>
              <div class="controls">
                <button class="up" @pointerdown="setDirection('up')" @pointerup="setDirection('idle')" @pointerleave="setDirection('idle')" :disabled="!roomId">↑</button>
                <button class="left" @pointerdown="setDirection('left')" @pointerup="setDirection('idle')" @pointerleave="setDirection('idle')" :disabled="!roomId">←</button>
                <button class="stop" @click="setDirection('idle')" :disabled="!roomId">■</button>
                <button class="right" @pointerdown="setDirection('right')" @pointerup="setDirection('idle')" @pointerleave="setDirection('idle')" :disabled="!roomId">→</button>
                <button class="down" @pointerdown="setDirection('down')" @pointerup="setDirection('idle')" @pointerleave="setDirection('idle')" :disabled="!roomId">↓</button>
              </div>
              <p class="hint">同步开始后，可使用方向键或按钮移动自己的方块。位置只在收到服务端帧后更新。</p>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>事件</h2>
          <div class="event-log">
            <span v-if="logs.length === 0" class="empty">等待操作...</span><template v-for="item in logs" :key="item.id">{{ item.text }}
</template>
          </div>
          <div class="actions">
            <button class="secondary" @click="clearLogs">清空</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          ws: null,
          connected: false,
          url: 'ws://localhost:10100/ws',
          clientId: '',
          confirmed: false,
          roomExists: false,
          matching: false,
          roomId: '',
          players: [],
          latestFrameIndex: 0,
          timer: null,
          localSeq: 0,
          direction: 'idle',
          positions: {},
          logs: [],
          logId: 0
        };
      },
      computed: {
        canMatch() {
          return this.connected && this.confirmed && !this.roomId;
        },
        playersText() {
          return this.players.length ? this.players.join(', ') : '-';
        }
      },
      mounted() {
        window.addEventListener('keydown', this.onKeyDown);
        window.addEventListener('keyup', this.onKeyUp);
        this.drawStage();
      },
      beforeUnmount() {
        window.removeEventListener('keydown', this.onKeyDown);
        window.removeEventListener('keyup', this.onKeyUp);
        this.stopSync();
      },
      methods: {
        connect() {
          this.ws = new WebSocket(this.url);
          this.ws.onopen = () => {
            this.connected = true;
            this.pushLog('open', this.url);
          };
          this.ws.onmessage = (event) => {
            const packet = this.parsePacket(event.data);
            this.handlePacket(packet);
          };
          this.ws.onerror = () => {
            this.pushLog('error', 'websocket error');
          };
          this.ws.onclose = () => {
            this.connected = false;
            this.stopSync();
            this.pushLog('close', this.url);
          };
        },
        disconnect() {
          if (this.ws) {
            this.ws.close();
          }
        },
        confirmId() {
          this.send(5001, 1, { clientId: this.clientId });
        },
        resetId() {
          this.stopSync();
          this.confirmed = false;
          this.roomExists = false;
          this.matching = false;
          this.roomId = '';
          this.players = [];
          this.latestFrameIndex = 0;
          this.direction = 'idle';
          this.positions = {};
          this.drawStage();
        },
        joinMatch() {
          this.send(5001, 2, { clientId: this.clientId });
        },
        exitMatch() {
          this.send(5001, 3, { clientId: this.clientId });
        },
        setDirection(direction) {
          this.direction = direction;
          this.sendFrame();
        },
        onKeyDown(event) {
          const map = {
            ArrowUp: 'up',
            ArrowDown: 'down',
            ArrowLeft: 'left',
            ArrowRight: 'right'
          };
          const direction = map[event.key];
          if (!direction || !this.roomId) {
            return;
          }
          event.preventDefault();
          if (this.direction !== direction) {
            this.setDirection(direction);
          }
        },
        onKeyUp(event) {
          if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
            return;
          }
          event.preventDefault();
          this.setDirection('idle');
        },
        sendFrame() {
          if (!this.connected || !this.roomId) {
            return;
          }

          this.localSeq += 1;
          this.send(5001, 4, {
            clientId: this.clientId,
            roomId: this.roomId,
            input: {
              seq: this.localSeq,
              direction: this.direction
            }
          });
        },
        send(cmd, subCmd, data) {
          const packet = { cmd, subCmd, data };
          this.ws.send(JSON.stringify(packet));
        },
        handlePacket(packet) {
          if (!packet || packet.cmd !== 5001 || packet.code !== 0) {
            return;
          }

          if (packet.subCmd === 1) {
            this.handleCheck(packet.data || {});
            return;
          }
          if (packet.subCmd === 2) {
            this.handleJoin(packet.data || {});
            return;
          }
          if (packet.subCmd === 3) {
            this.matching = false;
            this.pushLog('state', '已退出匹配');
            return;
          }
          if (packet.subCmd === 6) {
            this.handlePush(packet.data || {});
          }
        },
        handleCheck(data) {
          this.confirmed = true;
          this.roomExists = Boolean(data.exists);
          if (!data.exists) {
            this.pushLog('state', '未发现已有房间，可以加入或退出匹配');
            return;
          }

          this.roomId = data.roomId || '';
          this.players = data.players || [];
          this.ensurePlayers();
          this.replayFrames(data.frames || []);
        },
        handleJoin(data) {
          this.matching = !data.matched;
          if (!data.matched) {
            this.pushLog('state', '等待另一个客户端加入');
            return;
          }
          this.startRoom(data.roomId, data.players || []);
        },
        handlePush(data) {
          if (data.type === 'started') {
            this.matching = false;
            this.startRoom(data.roomId, data.players || []);
            return;
          }
          if (data.type === 'frame' && data.frame) {
            this.applyFrame(data.frame);
          }
        },
        startRoom(roomId, players) {
          this.roomId = roomId;
          this.players = players;
          this.roomExists = true;
          this.ensurePlayers();
          this.drawStage();
          this.pushLog('state', `同步开始：${roomId}`);
          this.startSync();
        },
        replayFrames(frames) {
          this.pushLog('state', `发现已有房间，从第 1 帧开始追帧，共 ${frames.length} 帧`);
          this.stopSync();
          this.latestFrameIndex = 0;
          this.positions = {};
          this.ensurePlayers();
          this.drawStage();

          let index = 0;
          const replay = () => {
            if (index >= frames.length) {
              this.pushLog('state', '追帧完成，继续同步');
              this.startSync();
              return;
            }
            this.applyFrame(frames[index]);
            index += 1;
            window.setTimeout(replay, 60);
          };
          replay();
        },
        startSync() {
          if (this.timer || !this.roomId) {
            return;
          }
          this.timer = window.setInterval(this.sendFrame, 180);
        },
        stopSync() {
          if (this.timer) {
            window.clearInterval(this.timer);
            this.timer = null;
          }
        },
        applyFrame(frame) {
          this.latestFrameIndex = Math.max(this.latestFrameIndex, Number(frame.index || 0));
          const inputs = frame.inputs || {};
          Object.keys(inputs).forEach((clientId) => {
            this.movePlayer(clientId, inputs[clientId].input || {});
          });
          this.drawStage();
        },
        ensurePlayers() {
          this.players.forEach((clientId, index) => {
            if (this.positions[clientId]) {
              return;
            }
            this.positions[clientId] = {
              x: index === 0 ? 180 : 560,
              y: 250,
              color: index === 0 ? '#2563eb' : '#dc2626'
            };
          });
        },
        movePlayer(clientId, input) {
          if (!this.positions[clientId]) {
            this.positions[clientId] = { x: 400, y: 250, color: '#16a34a' };
          }

          const pos = this.positions[clientId];
          const step = 8;
          const direction = input.direction || 'idle';
          if (direction === 'up') {
            pos.y -= step;
          } else if (direction === 'down') {
            pos.y += step;
          } else if (direction === 'left') {
            pos.x -= step;
          } else if (direction === 'right') {
            pos.x += step;
          }

          pos.x = Math.max(14, Math.min(786, pos.x));
          pos.y = Math.max(14, Math.min(486, pos.y));
        },
        drawStage() {
          const canvas = this.$refs.stage;
          if (!canvas) {
            return;
          }

          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#f8fafc';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.strokeStyle = '#d8dee8';
          ctx.lineWidth = 1;
          for (let x = 40; x < canvas.width; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
          }
          for (let y = 40; y < canvas.height; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
          }

          Object.keys(this.positions).forEach((clientId) => {
            const pos = this.positions[clientId];
            ctx.fillStyle = pos.color;
            ctx.fillRect(pos.x - 14, pos.y - 14, 28, 28);
            ctx.fillStyle = '#111827';
            ctx.font = '14px sans-serif';
            ctx.fillText(clientId, pos.x - 18, pos.y - 22);
          });
        },
        clearLogs() {
          this.logs = [];
        },
        parsePacket(text) {
          try {
            return JSON.parse(text);
          } catch (_) {
            return null;
          }
        },
        pushLog(type, message) {
          const time = new Date().toLocaleTimeString();
          this.logs.unshift({
            id: ++this.logId,
            text: `[${time}] ${type}\n${message}\n`
          });
          this.logs = this.logs.slice(0, 20);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
